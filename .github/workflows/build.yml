name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        include:
          # Linux
          - os: linux
            runner: ubuntu-latest
          # macOS
          - os: darwin
            runner: macos-latest
          # Windows
          - os: windows
            runner: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc sqlite3

      - name: Download dependencies
        run: go mod download

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.os == 'windows' && 'windows' || matrix.os == 'darwin' && 'darwin' || 'linux' }}
          GOARCH: amd64
          CGO_ENABLED: ${{ matrix.os == 'windows' && '0' || '1' }}
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows" ]; then
            go build -ldflags="-s -w" -o dist/cockpit.exe ./cmd/cockpit
            go build -ldflags="-s -w" -o dist/cockpit-agent.exe ./cmd/cockpit-agent
          else
            go build -ldflags="-s -w" -o dist/cockpit ./cmd/cockpit
            go build -ldflags="-s -w" -o dist/cockpit-agent ./cmd/cockpit-agent
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cockpit-${{ matrix.os }}-amd64
          path: dist/*
          retention-days: 7
