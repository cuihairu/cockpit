name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run go test
        run: go test ./... -v -timeout 30s

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install sqlite dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc sqlite3

      - name: Build Server
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o dist/cockpit ./cmd/cockpit
          go build -ldflags="-s -w" -o dist/cockpit-agent ./cmd/cockpit-agent

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: cockpit-linux-amd64
          path: dist/cockpit
          retention-days: 7

      - name: Upload agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: cockpit-agent-linux-amd64
          path: dist/cockpit-agent
          retention-days: 7
