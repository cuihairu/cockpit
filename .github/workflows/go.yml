name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run go test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build Server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o dist/cockpit-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/cockpit
          go build -ldflags="-s -w" -o dist/cockpit-agent-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/cockpit-agent

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cockpit-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/cockpit-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7

      - name: Upload agent artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cockpit-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/cockpit-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7
