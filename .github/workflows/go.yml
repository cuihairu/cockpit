name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run go test
        run: go test -short ./... -v -timeout 120s

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install sqlite dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc sqlite3

      - name: Build Server
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o dist/cockpit ./cmd/cockpit
          go build -ldflags="-s -w" -o dist/cockpit-agent ./cmd/cockpit-agent

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cockpit-linux-amd64
          path: dist/*
          retention-days: 7
          compression-level: 0
