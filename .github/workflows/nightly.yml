name: Nightly Build

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            cgo: "1"
            ext: ""
          - target: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            cgo: "0"
            ext: ".exe"
          - target: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            cgo: "1"
            ext: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc sqlite3

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite3

      - name: Download Go dependencies
        run: go mod download

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X main.version=$(date +%Y%m%d)" -o "dist/cockpit${{ matrix.ext }}" ./cmd/cockpit
          go build -ldflags="-s -w -X main.version=$(date +%Y%m%d)" -o "dist/cockpit-agent${{ matrix.ext }}" ./cmd/cockpit-agent

      - name: Package binaries
        shell: bash
        run: |
          cd dist
          tar czf "cockpit-${{ matrix.target }}-nightly.tar.gz" "cockpit${{ matrix.ext }}"
          tar czf "cockpit-agent-${{ matrix.target }}-nightly.tar.gz" "cockpit-agent${{ matrix.ext }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cockpit-${{ matrix.target }}
          path: |
            dist/cockpit-${{ matrix.target }}-nightly.tar.gz
            dist/cockpit-agent-${{ matrix.target }}-nightly.tar.gz
          retention-days: 7

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '${{ env.NODE_VERSION }}'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Build Web
        working-directory: web
        run: |
          pnpm install
          pnpm run build

      - name: Package Web
        run: tar czf cockpit-web-nightly.tar.gz -C web/dist .

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: cockpit-web
          path: cockpit-web-nightly.tar.gz
          retention-days: 7

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, build-web]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Update nightly tag
        run: |
          git tag -f nightly
          git push -f origin nightly

      - name: Update nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 如果 release 已存在则删除（保留 tag）
          if gh release view nightly > /dev/null 2>&1; then
            gh release delete nightly --yes --cleanup-tag=false
          fi

          DATE=$(date +%Y-%m-%d)

          gh release create nightly \
            --title "Nightly $DATE" \
            --latest=false \
            --notes "Automated nightly build ($DATE).

          ## Downloads
          | File | Platform | Arch |
          |------|----------|------|
          | \`cockpit-linux-amd64-nightly.tar.gz\` | Linux | x86_64 |
          | \`cockpit-agent-linux-amd64-nightly.tar.gz\` | Linux Agent | x86_64 |
          | \`cockpit-windows-amd64-nightly.tar.gz\` | Windows | x86_64 |
          | \`cockpit-agent-windows-amd64-nightly.tar.gz\` | Windows Agent | x86_64 |
          | \`cockpit-darwin-arm64-nightly.tar.gz\` | macOS | Apple Silicon |
          | \`cockpit-agent-darwin-arm64-nightly.tar.gz\` | macOS Agent | Apple Silicon |
          | \`cockpit-web-nightly.tar.gz\` | Web UI | cross-platform |" \
            dist/cockpit-linux-amd64-nightly.tar.gz \
            dist/cockpit-agent-linux-amd64-nightly.tar.gz \
            dist/cockpit-windows-amd64-nightly.tar.gz \
            dist/cockpit-agent-windows-amd64-nightly.tar.gz \
            dist/cockpit-darwin-arm64-nightly.tar.gz \
            dist/cockpit-agent-darwin-arm64-nightly.tar.gz \
            dist/cockpit-web-nightly.tar.gz
